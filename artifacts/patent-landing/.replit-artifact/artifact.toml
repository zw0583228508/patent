kind = "web"
previewPath = "/"
title = "Patent"
version = "1.0.0"
id = "artifacts/patent-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22174

[services.development]
run = "pnpm --filter @workspace/patent-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/patent-landing", "run", "build" ]
publicDir = "artifacts/patent-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22174"
BASE_PATH = "/"
